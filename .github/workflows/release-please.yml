name: Release Please

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

# Opt the workflow into Node.js 24 for any JavaScript action that's still
# pinned to Node 20 internally (googleapis/release-please-action@v4 was
# flagged by the runner deprecation warning on 2026-05-29). This is the
# documented forward-compatible flag from the runner deprecation notice
# (https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/);
# can be removed once the action ships a Node 24 native release and we
# bump the major.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Maintain release PR
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      # Maintains an open "release-please" PR with the next version bump
      # (from Conventional Commits since the last tag) + CHANGELOG additions
      # under `## [x.y.z]` headers. Merging that PR creates the git tag and
      # GitHub Release, which then triggers `.github/workflows/npm-publish.yml`
      # via the `release: types: [published]` event.
      - uses: googleapis/release-please-action@v4
        with:
          config-file: .github/release-please-config.json
          manifest-file: .release-please-manifest.json
