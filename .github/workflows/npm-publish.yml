name: NPM publish 🚀

# Triggered by a GitHub Release being published — which release-please
# creates automatically when its "release PR" is merged. `workflow_dispatch`
# is kept as a fallback for manual republish (e.g. failed previous run, or
# a hotfix outside the release-please flow).
on:
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: npm-publish
  cancel-in-progress: false

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    steps:
      - name: 'Checkout'
        uses: actions/checkout@v4
        with:
          # Needed so `git describe --tags --exact-match HEAD` can see tags
          # on the workflow_dispatch fallback path. The release-triggered
          # path doesn't need history, but it's cheap and uniform.
          fetch-depth: 0

      - name: 'Install pnpm'
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: 'Install node'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm

      - name: 'Install dependencies'
        run: pnpm install --frozen-lockfile

      - name: 'Upgrade npm CLI for OIDC trusted publishing'
        # Node 22 LTS ships with npm 10.x; OIDC trusted publishing requires
        # npm 11.5.1+. We use npm (not pnpm) for the actual publish so the
        # CLI's OIDC integration with the npm registry works first-class.
        # pnpm 10 stays in charge of install + lint + typecheck + test +
        # build — it's only the final `publish` step that switches to npm.
        #
        # Pinned to `^11.5.1` (not `@latest`) so a hypothetical npm 12
        # major can't roll in unnoticed on the next release run — every
        # bump above 11 will be a deliberate edit here. Cheap to revisit
        # once the OIDC flow has been proven on one real release.
        run: |
          npm install -g 'npm@^11.5.1'
          npm --version

      - name: 'Sanity check — tag matches package.json version'
        # Cheap insurance against a manually-pushed tag that disagrees with
        # package.json (release-please keeps them in sync; a workflow_dispatch
        # from a feature branch could drift). Runs on BOTH triggers: the
        # release event sets GITHUB_REF to `refs/tags/vX.Y.Z`, and for
        # workflow_dispatch we ask git for the exact-match tag on HEAD; if
        # HEAD is not tagged, fail loudly so a manual dispatch can't ship
        # an unidentified build.
        shell: bash
        run: |
          PKG=$(node -p "require('./package.json').version")
          if [ "${GITHUB_EVENT_NAME}" = "release" ]; then
            RAW="${GITHUB_REF#refs/tags/}"
            TAG="${RAW#v}"
            SOURCE="release event"
          else
            # workflow_dispatch — derive tag from the commit HEAD points at.
            RAW=$(git describe --tags --exact-match HEAD 2>/dev/null || true)
            if [ -z "$RAW" ]; then
              echo "::error::workflow_dispatch publish requires HEAD to be on a tag (none found). Push tag v$PKG or use the release event."
              exit 1
            fi
            TAG="${RAW#v}"
            SOURCE="workflow_dispatch on tag $RAW"
          fi
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag $TAG (from $SOURCE) does not match package.json version $PKG"
            exit 1
          fi
          echo "Publishing v$PKG (verified via $SOURCE)"

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Test
        # test:coverage so the threshold floor is enforced on the publish path
        # too — `pnpm test` alone would let a coverage regression ship to npm.
        run: pnpm test:coverage

      - name: Build
        run: pnpm build

      - name: Docs (TypeDoc dry-run)
        # Mirror the PR-time gate from ci.yml: a release path should not ship
        # to npm if the JSDoc surface that just landed has a broken {@link}.
        run: pnpm run docs:build

      - name: 'Publish 🚀 (OIDC trusted publishing)'
        # No NODE_AUTH_TOKEN / NPM_AUTH_TOKEN: npm requests a short-lived
        # OIDC token from GitHub Actions (via id-token: write + the env
        # vars setup-node arranges), exchanges it with the npm registry
        # for a one-shot publish credential, and ships. The trusted-
        # publisher binding (repo + workflow path -> npm package) is
        # configured on the npm side by the package maintainer.
        #
        # --ignore-scripts: the explicit `Build` step above already
        # produced dist/; we skip the `prepack` hook (which would re-
        # invoke `pnpm run build`) to keep the publish path lean.
        # --provenance: cryptographic attestation that this tarball
        # came from this exact workflow run (was already wired in
        # PR #4; OIDC publishing complements it).
        shell: bash
        run: npm publish --access public --provenance --ignore-scripts
