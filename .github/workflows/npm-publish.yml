name: NPM publish 🚀

on:
  workflow_dispatch:

jobs:
  process:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: 'Checkout'
        uses: actions/checkout@v4

      - name: 'Install pnpm'
        uses: pnpm/action-setup@v4

      - name: 'Install node'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm

      - name: 'Install dependencies'
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Test
        # test:coverage so the threshold floor is enforced on the publish path
        # too — `pnpm test` alone would let a coverage regression ship to npm.
        run: pnpm test:coverage

      - name: Build
        run: pnpm build

      - name: 'Publish 🚀'
        shell: bash
        run: pnpm publish --access public --provenance --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_AUTH_TOKEN }}
