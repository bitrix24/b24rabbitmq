name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  commitlint:
    name: Commit messages
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Lint PR title
        run: echo "${{ github.event.pull_request.title }}" | pnpm exec commitlint
      - name: Lint commit messages
        run: pnpm exec commitlint --from=${{ github.event.pull_request.base.sha }} --to=${{ github.event.pull_request.head.sha }}

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  test:
    name: Unit tests (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Use test:coverage so the thresholds in vitest.config.ts are enforced.
      - run: pnpm test:coverage

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  docs:
    name: Docs (TypeDoc dry-run)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Build-only — the Pages deploy lives in docs.yml and runs post-merge.
      # This job exists so a broken {@link}, missing entry point, or other
      # TypeDoc warning fails the PR BEFORE merge instead of flipping the
      # Docs badge red on `main`. `treatWarningsAsErrors: true` in typedoc.json.
      - run: pnpm run docs:build

  ci:
    # Aggregator job whose name (`ci`) is what `Settings → Branches →
    # Branch protection rules → Require status checks` points at. This
    # spares the maintainer from having to enumerate every job above as
    # a separate required check — one line in branch protection,
    # one bash test here, every gate covered.
    #
    # `if: always()` runs this job even if a dependency failed, so
    # branch protection sees a concrete success/failure status instead
    # of a permanently-pending `ci` (which would silently block every
    # PR — the exact failure mode this aggregator fixes).
    name: ci
    runs-on: ubuntu-latest
    if: always()
    needs: [lint, typecheck, test, build, docs]
    steps:
      - name: Aggregate required-gate results
        env:
          LINT: ${{ needs.lint.result }}
          TYPECHECK: ${{ needs.typecheck.result }}
          TEST: ${{ needs.test.result }}
          BUILD: ${{ needs.build.result }}
          DOCS: ${{ needs.docs.result }}
        run: |
          echo "lint=$LINT typecheck=$TYPECHECK test=$TEST build=$BUILD docs=$DOCS"
          if [ "$LINT" = "success" ] \
             && [ "$TYPECHECK" = "success" ] \
             && [ "$TEST" = "success" ] \
             && [ "$BUILD" = "success" ] \
             && [ "$DOCS" = "success" ]; then
            echo "All required CI gates passed."
          else
            echo "::error::One or more required CI gates did not succeed."
            exit 1
          fi
